# ==============================================================================
# ORDERS API - Deployment + Service
# ==============================================================================
# This is the "allowed client." Cilium policies explicitly grant this service
# access to the catalog-api. It is labeled with 'role: frontend' to distinguish
# it from other pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: cilium-demo
  labels:
    app: orders-api
    role: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
        role: frontend
    spec:
      containers:
      - name: orders-api
        # NOTE: Replace with your own Docker Hub / GHCR image after building.
        image: arpanpathak/cilium-orders-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: PORT
          value: "8081"
        - name: CATALOG_URL
          # Internal Kubernetes DNS — no Load Balancer needed.
          value: "http://catalog-api.cilium-demo.svc.cluster.local:8080"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi
---
# ClusterIP service — internal only, no Load Balancer cost.
apiVersion: v1
kind: Service
metadata:
  name: orders-api
  namespace: cilium-demo
  labels:
    app: orders-api
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: orders-api
