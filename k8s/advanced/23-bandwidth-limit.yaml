# ==============================================================================
# EXERCISE 4: Bandwidth Rate Limiting — "Throttle the Noisy Neighbor"
# ==============================================================================
# Scenario:
#   The intruder pod is flooding the network with traffic, degrading
#   performance for orders-api and catalog-api. Using Cilium's bandwidth
#   manager, you throttle the intruder to 1Mbit/s egress — without touching
#   the pod spec or redeploying.
#
# WHY THIS IS COOL:
#   Cilium's bandwidth manager uses eBPF EDT (Earliest Departure Time)
#   scheduling in the kernel. No tc (traffic control) rules, no iptables.
#   Just a pod annotation and Cilium handles the rest.
#
# HOW TO TEST:
#   1. First, baseline the intruder's bandwidth (no limit):
#      kubectl exec intruder -n cilium-demo -- wget -O /dev/null http://catalog-api:8080/items
#
#   2. Apply this annotation to the intruder pod:
#      kubectl annotate pod intruder -n cilium-demo \
#        kubernetes.io/egress-bandwidth="1M" --overwrite
#
#   3. Test again — should be throttled:
#      kubectl exec intruder -n cilium-demo -- wget -O /dev/null http://catalog-api:8080/items
#
#   4. You can also apply it via the pod spec (see below).
#
# NOTE: Bandwidth manager must be enabled in Cilium config:
#   cilium install --set bandwidthManager.enabled=true
# ==============================================================================
#
# To apply bandwidth limits via pod spec, redeploy the intruder with annotations:
apiVersion: v1
kind: Pod
metadata:
  name: intruder-throttled
  namespace: cilium-demo
  labels:
    app: intruder-throttled
    role: malicious
  annotations:
    # Cilium reads this annotation and applies eBPF-based rate limiting.
    # Format: <rate> where rate is in bits/sec. Suffixes: K, M, G.
    kubernetes.io/egress-bandwidth: "1M"    # 1 Megabit/sec
    kubernetes.io/ingress-bandwidth: "1M"   # 1 Megabit/sec
spec:
  containers:
  - name: intruder
    image: alpine/curl:latest
    command: ["sleep", "infinity"]
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 32Mi
